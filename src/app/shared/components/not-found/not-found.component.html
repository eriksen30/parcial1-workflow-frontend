<div class="not-found">
  <div class="content">
    <div class="error-code">404</div>
    <div class="divider"></div>
    <div class="error-info">
      <h1>Página no encontrada</h1>
      <p>La página que buscás no existe o fue movida a otra dirección.</p>
      <div class="actions">
        <button class="btn-primary" (click)="goHome()">Ir al Dashboard</button>
        <button class="btn-secondary" (click)="goBack()">Volver atrás</button>
      </div>
    </div>
  </div>
</div>
